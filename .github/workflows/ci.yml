name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Minimal permissions: read-only on contents.
permissions:
  contents: read

jobs:
  ci:
    name: ci (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      # Don't cancel other matrix legs when one fails; useful for cross-version signal.
      fail-fast: false
      matrix:
        # 3.6 is EOL and incompatible with actions/setup-python@v5; test the
        # oldest LTS-style version (3.8), a mid-range (3.10), and current (3.12).
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies
        # libpython3-dev: needed by some ctypes-based tk/pyglet bindings.
        # python3-tk:    Tk runtime required by the GUI even if we don't import
        #                tkinter directly in CI; keeps `python -c "import tkinter"`
        #                working on a fresh runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y libpython3-dev python3-tk

      - name: Install Python dependencies
        # Prefer the project's [dev] extra; fall back to a minimal set if
        # pyproject.toml is missing (e.g. very early in the project).
        run: |
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]"
          else
            pip install ruff pytest
          fi

      - name: Lint with ruff
        # continue-on-error is intentionally false: lint failures SHOULD fail CI.
        # But if ruff somehow didn't install (e.g. network blip), degrade to a
        # warning rather than a hard failure.
        run: |
          if command -v ruff >/dev/null 2>&1; then
            ruff check src/
          else
            echo "::warning::ruff not available on PATH; skipping lint step"
          fi

      - name: Compile check (src/)
        # Cheap, fast syntax sanity check across all .py files under src/.
        # pactl/pipewire are NOT invoked here -- this is pure AST compilation.
        run: python3 -m compileall -q src/

      - name: Run tests
        # Allow the absence of a tests/ tree for now (project is pre-alpha).
        # If tests/ exists and has at least one test file, run pytest normally
        # so real test failures will still fail the job.
        run: |
          if [ -d tests ] && [ -n "$(find tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
            python3 -m pytest tests/
          else
            echo "No tests found in tests/, skipping pytest"
          fi

      - name: Validate presets JSON
        # Only run if the file is present. We don't fail on a missing file
        # (project may not have shipped its first user preset yet), but if it
        # IS present it MUST be valid JSON.
        if: hashFiles('presets/user_presets.json') != ''
        run: python3 -c "import json; json.load(open('presets/user_presets.json'))"
